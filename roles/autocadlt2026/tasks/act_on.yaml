---
- name: Get package information
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: info

- name: Normalize versions
  ansible.builtin.set_fact:
    win_workman_installed_version: "{{ win_workman_detect_sw.result.display_version | default('', true) | trim }}"
    win_workman_target_version: >-
      {{
        win_workman_schema.package.version if (
          win_workman_schema.package.version is defined
          and win_workman_schema.package.version is not none
        ) else 'latest'
      }}

- name: Classify version relation
  ansible.builtin.set_fact:
    win_workman_version_relation: >-
      {{
        "none" if (
          win_workman_installed_version | length == 0
          or win_workman_target_version | length == 0
        ) else (
          "lt" if (
            win_workman_target_version == 'latest' or
            win_workman_installed_version is version(win_workman_target_version, '<')
          ) else (
            "gt" if (
              win_workman_installed_version is version(win_workman_target_version, '>')
            ) else "eq"
          )
        )
      }}

- name: Classify operation
  ansible.builtin.set_fact:
    win_workman_operation: >-
      {{
        'install' if (
          win_workman_installed_version | length == 0
          and win_workman_target_version | length >= 0
        ) else (
          'upgrade' if (
            win_workman_version_relation == 'lt'
          ) else (
            'downgrade' if (
              win_workman_version_relation == 'gt'
            ) else 'noop'
          )
        )
      }}

- name: Needs action
  ansible.builtin.set_fact:
    win_workman_needs_action: "{{ win_workman_operation in ['install', 'upgrade', 'downgrade'] }}"

# Guard: fail fast if a different locale is already installed.
# AutoCAD LT 2026 locales use separate bundles that cannot coexist.
- name: Detect any installed AutoCAD LT 2026 locale
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: detect_sw
  vars:
    win_workman_detect_sw_args:
      name_like: "Autodesk AutoCAD LT 2026*"
  when: win_workman_needs_action | bool

- name: Fail if a conflicting locale is already installed
  ansible.builtin.fail:
    msg: >-
      Cannot install {{ win_workman_autodesk_bundle_display_name }}.
      "{{ win_workman_detect_sw.result.display_name }}" is already installed.
      Uninstall it first with: autocadlt2026-off
  when:
    - win_workman_needs_action | bool
    - win_workman_detect_sw.result.id is defined
    - win_workman_detect_sw.result.id is not none
    - win_workman_detect_sw.result.id != win_workman_autodesk_bundle_guid

- name: Download
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: download
  when:
    - win_workman_needs_action | bool

- name: Check if Autocad is already present
  ansible.windows.win_stat:
    path: "{{ win_workman_autodesk_autocad_path }}"
  register: win_workman_autocad_stat

- name: Copy files to Windows temporary directory
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: win_copy
  when:
    - win_workman_needs_action | bool
    - not win_workman_autocad_stat.stat.exists

- name: Install "{{ win_workman_autodesk_bundle_display_name }}"
  ansible.windows.win_powershell:
    script: |
      param(
        [string]$ExePath,
        [string]$SearchName,
        [string]$ManifestPath,
        [int]$TimeoutSec
      )
      $Ansible.Changed = $false
      $Ansible.Failed  = $false
      $ErrorActionPreference = "Stop"

      try {
        if (-not (Test-Path -LiteralPath $ExePath)) {
          throw "Installer not found: $ExePath"
        }

        # The ODIS SFX bundle spawns db-bootstrap.exe and waits for it.
        # db-bootstrap.exe writes ODIS metadata (bundleManifest.xml) needed
        # by the uninstaller, and can block for hours on network calls.
        # We launch without -Wait, poll until BOTH the registry entry and
        # the ODIS bundle manifest are present, then kill db-bootstrap.exe
        # so the SFX can exit cleanly.
        $proc = Start-Process -FilePath $ExePath -ArgumentList "-q" -PassThru -ErrorAction Stop

        $start          = Get-Date
        $acadInstalled  = $false
        $manifestReady  = $false

        while (((Get-Date) - $start).TotalSeconds -lt $TimeoutSec) {
          Start-Sleep -Seconds 15

          if ($proc.HasExited -and -not $acadInstalled) {
            if ($proc.ExitCode -notin @(0, $null)) {
              throw "Installer exited with code $($proc.ExitCode) before installation was detected"
            }
          }

          if (-not $acadInstalled) {
            $entry = Get-ItemProperty `
              'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*' `
              -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -like $SearchName }
            if ($entry) { $acadInstalled = $true }
          }

          if ($acadInstalled -and (Test-Path -LiteralPath $ManifestPath)) {
            $manifestReady = $true
            break
          }
        }

        if (-not $acadInstalled) {
          throw "AutoCAD installation not detected after ${TimeoutSec}s"
        }
        if (-not $manifestReady) {
          throw "ODIS bundle manifest not written after ${TimeoutSec}s ($ManifestPath)"
        }

        # Both registry entry and ODIS manifest present — safe to stop db-bootstrap.exe
        Get-Process -Name 'db-bootstrap' -ErrorAction SilentlyContinue |
          Stop-Process -Force -ErrorAction SilentlyContinue

        # Wait up to 60s for the SFX parent to exit cleanly
        $proc.WaitForExit(60000) | Out-Null

        $Ansible.Changed = $true
        $Ansible.Result  = @{ exit_code = $proc.ExitCode }

      } catch {
        $Ansible.Failed = $true
        $Ansible.Result = @{ msg = $_.Exception.Message }
      }
    parameters:
      ExePath:      "{{ ansible_remote_tmp }}\\{{ win_workman_autodesk_setup_exe }}"
      SearchName:   "{{ win_workman_autocadlt2026_locale_data[win_workman_autocadlt2026_lang].search_name }}"
      ManifestPath: "{{ win_workman_autodesk_bundle_manifest_path }}"
      TimeoutSec:   1800
  when:
    - win_workman_needs_action | bool
    - not win_workman_autocad_stat.stat.exists

- name: Reboot if pending after install
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: pending_restart
  when:
    - win_workman_needs_action | bool
    - not win_workman_autocad_stat.stat.exists

- name: Register Autocad Lt 2026 license helper
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: run_as_system
  vars:
    win_workman_system_task_exe: "{{ win_workman_autodesk_helper_path }}"
    win_workman_system_task_args: >-
      register
      -pk {{ win_workman_autodesk_product_key }}
      -pv {{ win_workman_autodesk_product_ver }}
      -cf "{{ win_workman_autodesk_pit_path }}"
      -el {{ win_workman_autodesk_locale }}
    win_workman_system_task_name: "Autodesk_Register_ACDLT_2026"
    win_workman_system_task_timeout: 300
  when:
    - win_workman_needs_action | bool

- name: Purge files from Windows temporary directory
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: win_clean_temp
  when:
    - win_workman_needs_action | bool
