---
- name: Detect AutoCAD LT 2026 default language from host locale
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: detect_lang
  vars:
    win_workman_detect_lang_allowed: "{{ win_workman_autocadlt2026_allowed_langs }}"

- name: Dispatch action on
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.autocadlt2026
    tasks_from: act_on
  vars:
    win_workman_schema: "{{ win_workman_autocadlt2026_schema }}"
  when: win_workman_action in ["on", ""]

- name: Dispatch action off
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.autocadlt2026
    tasks_from: act_off
  vars:
    win_workman_schema: "{{ win_workman_autocadlt2026_schema }}"
  when: win_workman_action == "off"

- name: Dispatch to package workflow
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: pkg_workflow
  vars:
    win_workman_schema: "{{ win_workman_autocadlt2026_schema }}"
  when:
    - win_workman_action not in ["on", "off", ""]
