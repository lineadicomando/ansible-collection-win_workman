# --- locale resolution -------------------------------------------------------

# Resolve win_workman_default_lang (BCP47, e.g. "it-IT") to an allowed lang code.
# Tries exact match first, then ISO 639-1 base code (e.g. "it-IT" → "it").
win_workman_autocadlt2026_default_lang: >-
  {{
    (
      [
        win_workman_default_lang | default('', true),
        win_workman_default_lang | default('', true) | regex_replace('^([a-z]{2})[-_].*$', '\\1')
      ]
      | select('in', win_workman_autocadlt2026_allowed_langs)
      | list | first
    ) | default('en', true)
  }}

# Explicit override via task argv (e.g. autocadlt2026[it]) takes priority.
win_workman_autocadlt2026_lang: >-
  {{
    (
      (win_workman_task_argv | default([]))
      | select('in', win_workman_autocadlt2026_allowed_langs)
      | list | first
    ) | default(win_workman_autocadlt2026_default_lang, true)
  }}

