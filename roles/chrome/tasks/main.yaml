---
- name: Set schema role context
  ansible.builtin.set_fact:
    win_workman_schema_role_name: lineadicomando.win_workman.chrome
    win_workman_schema_dir: chrome

- name: Dispatch action rm
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.chrome
    tasks_from: act_rm
  when: win_workman_action == "rm"

- name: Dispatch action privacy
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.chrome
    tasks_from: act_privacy
  when: win_workman_action == "privacy"

- name: Dispatch to package workflow
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: pkg_workflow
  vars:
    win_workman_schema: "{{ win_workman_chrome_schema }}"
  when: win_workman_action not in ["rm", "privacy"]
