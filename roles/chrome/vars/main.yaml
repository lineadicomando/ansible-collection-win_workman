# ==============================================================================
#  Software Information:
#      - Name:        Google Chrome
#      - Homepage:    https://www.google.com/intl/en_US/chrome/
#      - Download:    https://chromeenterprise.google/download/
# ==============================================================================
---
win_workman_chrome_before_act_ps_script: |
  $Ansible.Changed = $false
  $process = Get-Process -Name chrome -ErrorAction SilentlyContinue
  if ($process) {
      Stop-Process -InputObject $process -Force:$true
      $Ansible.Changed = $true
  }
win_workman_chrome_shortcut_arguments: >-
  {{
    (
      ("--disable-search-engine-choice-screen " if win_workman_chrome_shortcut_no_first_run | bool else "") +
      ("--no-default-browser-check " if win_workman_chrome_shortcut_no_first_run | bool else "") +
      ("--no-first-run " if win_workman_chrome_shortcut_no_first_run | bool else "") +
      win_workman_chrome_shortcut_url
    ) | trim
  }}
win_workman_chrome_arch: >-
  {{
    "32bit" if (
      "32bit" in (win_workman_task_argv | default([]))
    ) else "64bit"
  }}

win_workman_chrome_setup_filename:
  64bit: googlechromestandaloneenterprise64.msi
  32bit: googlechromestandaloneenterprise.msi

win_workman_chrome_url:
  64bit:
    "https://dl.google.com/tag/s/appguid%3D%7B8A69D345-D564-463C-AFF1-A69D9E530F96%7D%26iid%3D%7B442C0F68-\
    9C4B-4D9A-9C6E-1C7E5A54734E%7D%26browser%3D3%26usagestats%3D0%26appname%3DGoogle%2520Chrome%26needsadm\
    in%3Dtrue%26ap%3Dx64-stable-statsdef_0%26brand%3DGCEA/dl/chrome/install/googlechromestandaloneenterpri\
    se64.msi"
  32bit:
    "https://dl.google.com/tag/s/appguid%3D%7B8A69D345-D564-463C-AFF1-A69D9E530F96%7D%26iid%3D%7B22399829-5\
    636-40D8-88A7-8C2A42345C45%7D%26browser%3D4%26usagestats%3D0%26appname%3DGoogle%2520Chrome%26needsadmin\
    %3Dtrue%26ap%3Dstable-arch_x86-statsdef_0%26brand%3DGCPS%26gclid%3DCj0KCQiAiebIBhDmARIsAE8PGNKiZ_bmr48n\
    mAdR5xY5yyjElptjZ8SYyma39r4nUkVxaqXPq7os3L8aAgRvEALw_wcB/dl/chrome/install/googlechromestandaloneenterp\
    rise.msi"

win_workman_chrome_program_file:
  64bit: "%ProgramFiles%"
  32bit: "%ProgramFiles(x86)%"

win_workman_chrome_shortcuts_schema:
  - description: "Google Chrome"
    src: "{{ win_workman_chrome_program_file[win_workman_chrome_arch] }}\\Google\\Chrome\\Application\\chrome.exe"
    arguments: "{{ win_workman_chrome_shortcut_arguments }}"
    dest: '%Public%\Desktop\Google Chrome.lnk'
    icon: "{{ win_workman_chrome_program_file[win_workman_chrome_arch] }}\\Google\\Chrome\\Application\\chrome.exe,0"
    directory: "{{ win_workman_chrome_program_file[win_workman_chrome_arch] }}\\Google\\Chrome\\Application\\"
  - description: "Google Chrome"
    src: "{{ win_workman_chrome_program_file[win_workman_chrome_arch] }}\\Google\\Chrome\\Application\\chrome.exe"
    arguments: "{{ win_workman_chrome_shortcut_arguments }}"
    dest: "%ProgramData%\\Microsoft\\Windows\\Start Menu\\Programs\\Google Chrome.lnk"
    icon: "{{ win_workman_chrome_program_file[win_workman_chrome_arch] }}\\Google\\Chrome\\Application\\chrome.exe,0"
    directory: "{{ win_workman_chrome_program_file[win_workman_chrome_arch] }}\\Google\\Chrome\\Application\\"

win_workman_chrome_schema:
  name: Google Chrome
  package:
    setup_file: "{{ win_workman_chrome_setup_filename[win_workman_chrome_arch] }}"
    searchName: "Google Chrome"
    # before_install_ps_script: "{{ win_workman_chrome_before_act_ps_script }}"
    before_uninstall_ps_script: "{{ win_workman_chrome_before_act_ps_script }}"
    cleanup_paths:
      - "{{ win_workman_chrome_program_file[win_workman_chrome_arch] }}\\Google\\Chrome"
  files:
    - filename: "{{ win_workman_chrome_setup_filename[win_workman_chrome_arch] }}"
      url: "{{ win_workman_chrome_url[win_workman_chrome_arch] }}"
  shortcuts: >-
    {{
      win_workman_chrome_shortcuts_schema if (
        win_workman_chrome_shortcuts | bool | default(false)
      ) else []
    }}

win_workman_schema_role_name: lineadicomando.win_workman.chrome
win_workman_schema_dir: chrome
