display_name: Microsoft Edge
custom_actions:
  - name: off
    description: Remove Microsoft Edge (enterprise uninstall)
  - name: privacy
    description: Clear user data (history, cache, cookies) for all Edge profiles
  - name: rm
    description: Remove the Edge profile directory for a specific user
defaults:
  - var: win_workman_edge_shortcuts
    type: bool
    default: false
    description: Create shortcuts on Desktop and Start Menu
  - var: win_workman_edge_shortcut_url
    type: str
    default: ""
    description: Default URL to open; empty means default new tab
  - var: win_workman_edge_shortcut_no_first_run
    type: bool
    default: true
    description: Pass --no-first-run flags to shortcut
notes: "Accepts '32bit' task argument. Closes running Edge before install/uninstall."
