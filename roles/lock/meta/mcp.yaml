display_name: Workstation Lock (maintenance mode)
custom_actions:
  - name: on
    description: Engage maintenance mode — show lock screen, optionally force logoff all users
  - name: off
    description: Disengage maintenance mode and restore normal logon
defaults:
  - var: win_workman_mode_title
    type: str
    default: "Maintenance in progress"
    description: Title shown on the lock screen
  - var: win_workman_mode_text
    type: str
    default: "The system is currently undergoing maintenance. Contact IT for assistance."
    description: Body text shown on the lock screen
  - var: win_workman_mode_force_logoff
    type: bool
    default: true
    description: Force logoff of all interactive sessions when engaging lock
  - var: win_workman_mode_interactive_logon_users
    type: list
    default: ["Administrators"]
    description: Groups/users still allowed to log on while lock is active
notes: "Does not install software; manages a Windows policy-based lock screen overlay."
