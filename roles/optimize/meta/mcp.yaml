display_name: Disk Optimization
custom_actions:
  - name: on
    description: Run disk optimization (TRIM for SSDs, defrag for HDDs) on target volumes
defaults:
  - var: win_workman_optimize_volumes
    type: list
    default: ["C"]
    description: Drive letters to optimize
  - var: win_workman_optimize_defrag
    type: bool
    default: false
    description: Force defragmentation even on SSDs (not recommended)
notes: "Only 'on' is meaningful; the standard 'off' action is a no-op."
