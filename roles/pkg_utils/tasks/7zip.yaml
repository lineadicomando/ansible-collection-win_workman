---
- name: Set 7zip facts
  ansible.builtin.set_fact:
    win_workman_7z_extra_dir: 7za
    win_workman_7z_extra_filename: 7z2600-extra.7z
    win_workman_7z_extra_url: >-
      https://github.com/ip7z/7zip/releases/download/26.00/7z2600-extra.7z

- name: 7zip | stage 7zr.exe on controller
  ansible.builtin.get_url:
    url: "{{ win_workman_7zr_url | default('https://7-zip.org/a/7zr.exe') }}"
    dest: "{{ win_workman_storage_path }}/7zr.exe"
    mode: "0664"
    timeout: 30
  delegate_to: localhost
  run_once: true

- name: 7zip | stage 7z2600-extra.7z on controller
  ansible.builtin.get_url:
    url: "{{ win_workman_7z_extra_url }}"
    dest: "{{ win_workman_storage_path }}/{{ win_workman_7z_extra_filename }}"
    mode: "0664"
    timeout: 30
  delegate_to: localhost
  run_once: true

- name: 7zip | copy 7zr.exe to Windows temporary directory
  ansible.windows.win_copy:
    src: "{{ win_workman_storage_path }}/7zr.exe"
    dest: "{{ win_workman_remote_tmp }}\\7zr.exe"
  changed_when: false

- name: >-
    7zip | copy {{ win_workman_7z_extra_filename }} to Windows temporary
    directory
  ansible.windows.win_copy:
    src: "{{ win_workman_storage_path }}/{{ win_workman_7z_extra_filename }}"
    dest: "{{ win_workman_remote_tmp }}\\{{ win_workman_7z_extra_filename }}"
  changed_when: false

- name: 7zip | ensure 7za.exe is available
  ansible.windows.win_powershell:
    script: |
      param(
        [string]$RemoteTmp,
        [string]$ExtraDir,
        [string]$ExtraFilename
      )

      $ErrorActionPreference = "Stop"

      $sevenZipBootstrap = Join-Path $RemoteTmp "7zr.exe"
      $extraArchive = Join-Path $RemoteTmp $ExtraFilename
      $extraPath = Join-Path $RemoteTmp $ExtraDir
      $sevenZip = Join-Path $extraPath "7za.exe"

      $hasExtraPath = Test-Path $extraPath -PathType Container
      $hasSevenZip = Test-Path $sevenZip -PathType Leaf
      if ($hasExtraPath -and $hasSevenZip) {
        $Ansible.Changed = $false
        $Ansible.Result = @{ sevenzip = $sevenZip; extracted = $false }
        return
      }

      if (-not (Test-Path $sevenZipBootstrap -PathType Leaf)) {
        throw "7zr.exe not found in win_workman_remote_tmp."
      }
      if (-not (Test-Path $extraArchive -PathType Leaf)) {
        throw "$ExtraFilename not found in win_workman_remote_tmp."
      }

      if (-not (Test-Path $extraPath -PathType Container)) {
        New-Item -ItemType Directory -Force -Path $extraPath | Out-Null
      }

      $ErrorActionPreference = "Continue"
      $output = & $sevenZipBootstrap x -y -o"$extraPath" -- $extraArchive 2>&1
      $exitCode = $LASTEXITCODE
      $ErrorActionPreference = "Stop"

      if ($exitCode -ne 0) {
        $Ansible.Failed = $true
        $Ansible.Result = @{
          sevenzip_bootstrap = $sevenZipBootstrap
          archive = $extraArchive
          destination = $extraPath
          exit_code = $exitCode
          output = ($output | Out-String).Trim()
        }
        return
      }

      if (-not (Test-Path $sevenZip -PathType Leaf)) {
        throw "7za.exe not found after extracting $ExtraFilename."
      }

      $Ansible.Changed = $true
      $Ansible.Result = @{
        sevenzip = $sevenZip; extracted = $true
        output = ($output | Out-String).Trim()
      }
    parameters:
      RemoteTmp: "{{ win_workman_remote_tmp }}"
      ExtraDir: "{{ win_workman_7z_extra_dir }}"
      ExtraFilename: "{{ win_workman_7z_extra_filename }}"

- name: 7zip | add or extract archive
  ansible.windows.win_powershell:
    script: |
      param(
        [string]$Command, [string]$ArchivePath,
        [string]$SourcePath, [string]$RemoteTmp, [string]$ExtraDir
      )

      $ErrorActionPreference = "Stop"

      $resolvedCommand = if ([string]::IsNullOrWhiteSpace($Command)) {
        "x"
      } else {
        $Command.ToLower()
      }
      $sevenZip = Join-Path (Join-Path $RemoteTmp $ExtraDir) "7za.exe"
      if (-not (Test-Path $sevenZip)) {
        throw "7za.exe not found in win_workman_remote_tmp."
      }

      $output = @()
      switch ($resolvedCommand) {
        "a" {
          $archiveDir = Split-Path -Parent $ArchivePath
          if ($archiveDir -and -not (Test-Path $archiveDir)) {
            New-Item -ItemType Directory -Force -Path $archiveDir | Out-Null
          }
          $ErrorActionPreference = "Continue"
          $output = & $sevenZip a -t7z -y -- $ArchivePath $SourcePath 2>&1
          $ErrorActionPreference = "Stop"
          break
        }
        "e" {
          if (-not (Test-Path $SourcePath)) {
            New-Item -ItemType Directory -Force -Path $SourcePath | Out-Null
          }
          $ErrorActionPreference = "Continue"
          $output = & $sevenZip e -y -o"$SourcePath" -- $ArchivePath 2>&1
          $ErrorActionPreference = "Stop"
          break
        }
        "x" {
          if (-not (Test-Path $SourcePath)) {
            New-Item -ItemType Directory -Force -Path $SourcePath | Out-Null
          }
          $ErrorActionPreference = "Continue"
          $output = & $sevenZip x -y -o"$SourcePath" -- $ArchivePath 2>&1
          $ErrorActionPreference = "Stop"
          break
        }
        default {
          throw "Unsupported command '$resolvedCommand'. Use 'a', 'e' or 'x'."
        }
      }

      if ($LASTEXITCODE -ne 0) {
        $Ansible.Failed = $true
        $Ansible.Result = @{
          command = $resolvedCommand; archive = $ArchivePath
          source = $SourcePath; sevenzip = $sevenZip
          exit_code = $LASTEXITCODE
          output = ($output | Out-String).Trim()
        }
        return
      }

      $Ansible.Changed = $true
      $Ansible.Result = @{
        command = $resolvedCommand; archive = $ArchivePath
        source = $SourcePath; sevenzip = $sevenZip
        exit_code = $LASTEXITCODE
        output = ($output | Out-String).Trim()
      }
    parameters:
      Command: "{{ win_workman_7zip_command }}"
      ArchivePath: "{{ win_workman_7zip_archive_path }}"
      SourcePath: "{{ win_workman_7zip_source_path }}"
      RemoteTmp: "{{ win_workman_remote_tmp }}"
      ExtraDir: "{{ win_workman_7z_extra_dir }}"
  register: win_workman_7zip
