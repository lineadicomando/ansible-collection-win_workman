---
- name: Check portable package
  ansible.builtin.set_fact:
    win_workman_pkg_portable: >-
      {{
        true if (
          win_workman_schema.package.provider is defined
          and win_workman_schema.package.provider == 'portable'
        ) else false
      }}

- name: Derive portable cleanup directories from files metadata | init
  ansible.builtin.set_fact:
    win_workman_portable_file_cleanup_dirs: []
  when:
    - win_workman_pkg_portable | bool

- name: Derive portable cleanup directories from files metadata | build
  ansible.builtin.set_fact:
    win_workman_portable_file_cleanup_dirs: >-
      {{ win_workman_portable_file_cleanup_dirs + [win_workman_portable_file_target_dir] }}
  vars:
    win_workman_portable_file_target_dir: >-
      {{
        win_workman_portable_file.dest_dir
        if (
          win_workman_portable_file.dest_dir is defined
          and win_workman_portable_file.dest_dir is not none
          and (win_workman_portable_file.dest_dir | string | trim | length) > 0
        )
        else ''
      }}
  loop: "{{ win_workman_schema.files | default([]) }}"
  loop_control:
    loop_var: win_workman_portable_file
  when:
    - win_workman_pkg_portable | bool
    - win_workman_portable_file_target_dir | length > 0

- name: Derive portable cleanup file paths from files metadata | init
  ansible.builtin.set_fact:
    win_workman_portable_cleanup_file_paths: []
  when:
    - win_workman_pkg_portable | bool

- name: Derive portable cleanup file paths from files metadata | build
  ansible.builtin.set_fact:
    win_workman_portable_cleanup_file_paths: >-
      {{ win_workman_portable_cleanup_file_paths + [win_workman_portable_file_target_path] }}
  vars:
    win_workman_portable_file_dest_base: >-
      {{
        win_workman_portable_path ~ '\\' ~ win_workman_portable_file.dest_dir
        if (
          win_workman_portable_file.dest_dir is defined
          and win_workman_portable_file.dest_dir is not none
          and (win_workman_portable_file.dest_dir | string | trim | length) > 0
        )
        else win_workman_portable_path
      }}
    win_workman_portable_file_target_path: >-
      {{
        win_workman_portable_file_dest_base ~ '\\' ~ win_workman_portable_file.filename
        if (
          (win_workman_portable_file.extract is not defined or win_workman_portable_file.extract != '7z')
          and (
            win_workman_portable_file.filename is defined
            and win_workman_portable_file.filename is not none
            and (win_workman_portable_file.filename | string | trim | length) > 0
          )
        )
        else ''
      }}
  loop: "{{ win_workman_schema.files | default([]) }}"
  loop_control:
    loop_var: win_workman_portable_file
  when:
    - win_workman_pkg_portable | bool
    - win_workman_portable_file_target_path | length > 0

- name: Set portable package cleanup directories
  ansible.builtin.set_fact:
    win_workman_portable_cleanup_dirs: >-
      {{
        win_workman_schema.package.portable_dirs
        if (
          win_workman_schema.package.portable_dirs is defined
          and win_workman_schema.package.portable_dirs is not none
        )
        else (
          [win_workman_schema.package.portable_dir]
          if (
            win_workman_schema.package.portable_dir is defined
            and win_workman_schema.package.portable_dir is not none
          )
          else (
            win_workman_portable_file_cleanup_dirs
            if (win_workman_portable_file_cleanup_dirs | length > 0)
            else (
              []
              if (win_workman_portable_cleanup_file_paths | default([]) | length > 0)
              else [win_workman_schema.name]
            )
          )
        )
      }}
  when:
    - win_workman_pkg_portable | bool

- name: Remove portable package shortcuts
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: shortcuts
  vars:
    win_workman_schema_shortcuts_state: "absent"
  when:
    - win_workman_pkg_portable | bool

- name: Remove portable package directories
  ansible.windows.win_file:
    path: "{{ win_workman_portable_path }}\\{{ win_workman_portable_cleanup_dir }}"
    state: absent
  loop: "{{ win_workman_portable_cleanup_dirs | default([]) }}"
  loop_control:
    loop_var: win_workman_portable_cleanup_dir
    label: "{{ win_workman_portable_cleanup_dir }}"
  when:
    - win_workman_pkg_portable | bool

- name: Remove portable package files
  ansible.windows.win_file:
    path: "{{ win_workman_portable_cleanup_file_path }}"
    state: absent
  loop: "{{ win_workman_portable_cleanup_file_paths | default([]) }}"
  loop_control:
    loop_var: win_workman_portable_cleanup_file_path
    label: "{{ win_workman_portable_cleanup_file_path }}"
  when:
    - win_workman_pkg_portable | bool

- name: Get package information
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: info
  when:
    - not (win_workman_pkg_portable | bool)

- name: Classify operation
  ansible.builtin.set_fact:
    win_workman_operation: "{{ 'uninstall' if (win_workman_is_present | bool) else 'noop' }}"
  when:
    - not (win_workman_pkg_portable | bool)

- name: Needs action
  ansible.builtin.set_fact:
    win_workman_needs_action: "{{ win_workman_operation == 'uninstall' }}"
  when:
    - not (win_workman_pkg_portable | bool)

- name: Search uninstall argv
  ansible.builtin.set_fact:
    win_workman_uninstall_string: >-
      {{
        win_workman_detect_sw.result.uninstall_string
        if (
          win_workman_detect_sw.result.uninstall_string is defined
          and win_workman_detect_sw.result.uninstall_string is not none
        ) else none
      }}
    win_workman_uninstall_args: >-
      {{
        win_workman_schema.package.uninstall_args
        if (
          win_workman_schema.package.uninstall_args is defined
          and win_workman_schema.package.uninstall_args is not none
        ) else none
      }}
    win_workman_cleanup_registry_key: >-
      {{
        win_workman_schema.package.cleanup_registry_key
        if (
          win_workman_schema.package.cleanup_registry_key is defined
          and win_workman_schema.package.cleanup_registry_key is not none
        ) else false
      }}
    win_workman_uninstall_valid_rc: >-
      {{
        win_workman_schema.package.uninstall_valid_rc
        if (
          win_workman_schema.package.uninstall_valid_rc is defined
          and win_workman_schema.package.uninstall_valid_rc is not none
        ) else [0]
      }}
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool

- name: Normalize uninstall argv
  ansible.builtin.set_fact:
    win_workman_uninstall_string_args: >-
      {{ (win_workman_uninstall_args | join(' ')) if (
            win_workman_uninstall_args is iterable
            and win_workman_uninstall_args is not string
          ) else win_workman_uninstall_args
      }}
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_uninstall_args is defined

- name: Before uninstall hook
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: include_tasks
  vars:
    win_workman_schema_tasks: "before_uninstall"
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool

- name: Before uninstall Powershell script
  ansible.windows.win_powershell:
    script: "{{ win_workman_schema.package.before_uninstall_ps_script }}"
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_schema.package.before_uninstall_ps_script is defined
    - win_workman_schema.package.before_uninstall_ps_script is not none

- name: "Uninstall package '{{ win_workman_schema.name }}'"
  ansible.windows.win_package:
    product_id: "{{ win_workman_product_id }}"
    state: absent
    provider: "{{ win_workman_provider | default('auto') }}"
    arguments: "{{ win_workman_uninstall_args | default(omit) }}"
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_schema.package.uninstall_via_helper is not defined or win_workman_schema.package.uninstall_via_helper is false
  register: win_workman_uninstall_result

- name: "Silently uninstall '{{ win_workman_schema.name }}' via helper"
  ansible.windows.win_powershell:
    script: |
      param(
          [string]$ExePath,
          [string]$ExeArgs,
          [int[]]$ValidReturnCodes = @(0)
      )
      $Ansible.Result = @{}
      $Ansible.Changed = $false
      $Ansible.Failed = $false
      $isMsiexecCommand = $ExePath -imatch '^\s*msiexec(\.exe)?\s'
      if ($isMsiexecCommand) {
          if ($ExePath -match '^(?i:msiexec(?:\.exe)?)\s*(.*)$') {
              $inlineArgs = $Matches[1]
              if (-not [string]::IsNullOrWhiteSpace($inlineArgs)) {
                  $ExeArgs = if ([string]::IsNullOrWhiteSpace($ExeArgs)) { $inlineArgs } else { "$inlineArgs $ExeArgs" }
              }
          }
          $ExePath = Join-Path $env:WINDIR "System32\msiexec.exe"
      } elseif ($ExePath -match '^"([^"]+)"\s*(.*)$') {
          $inlineArgs = $Matches[2]
          $ExePath = $Matches[1]
          if (-not [string]::IsNullOrWhiteSpace($inlineArgs)) {
              $ExeArgs = if ([string]::IsNullOrWhiteSpace($ExeArgs)) { $inlineArgs } else { "$inlineArgs $ExeArgs" }
          }
      }
      if (-not $isMsiexecCommand -and -not (Test-Path -LiteralPath $ExePath)) {
          $msg = "Uninstall helper not found at path: $ExePath"
          $Ansible.Result["Msg"] = $msg
          $Ansible.Failed = $true
          return
      }
      try {
          if ([string]::IsNullOrWhiteSpace($ExeArgs)) {
              $proc = Start-Process -FilePath $ExePath -Wait -PassThru -ErrorAction Stop
          } else {
              $proc = Start-Process -FilePath $ExePath -ArgumentList $ExeArgs -Wait -PassThru -ErrorAction Stop
          }
          if ($proc.ExitCode -notin $ValidReturnCodes) {
              $msg = "Uninstall helper returned unexpected exit code: $($proc.ExitCode)"
              $Ansible.Result["Msg"] = $msg
              $Ansible.Failed = $true
              return
          }
          $Ansible.Changed = $true
      }
      catch {
          $Ansible.Failed = $true
          $Ansible.Result["Msg"] = "Exception while running uninstall helper: " + $_.Exception.Message
      }
    parameters:
      ExePath: "{{ win_workman_uninstall_string }}"
      ExeArgs: "{{ win_workman_uninstall_string_args | default('', true) }}"
      ValidReturnCodes: "{{ win_workman_uninstall_valid_rc }}"
  register: win_workman_uninstall_via_helper_result
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_uninstall_string is not none
    - win_workman_schema.package.uninstall_via_helper is defined
    - win_workman_schema.package.uninstall_via_helper is true

- name: After uninstall hook
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: include_tasks
  vars:
    win_workman_schema_tasks: "after_uninstall"
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool

- name: After uninstall Powershell script
  ansible.windows.win_powershell:
    script: "{{ win_workman_schema.package.after_uninstall_ps_script }}"
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_schema.package.after_uninstall_ps_script is defined
    - win_workman_schema.package.after_uninstall_ps_script is not none

- name: Detect software after uninstall task
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: detect_sw
  vars:
    win_workman_detect_sw_args:
      name_like: "{{ win_workman_schema.package.searchName }}"
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_schema.package.searchName is defined
    - win_workman_schema.package.searchName is not none
    - win_workman_schema.package.searchName is string

- name: Cleanup registry key
  ansible.windows.win_regedit:
    path: "{{ win_workman_detect_sw.result.registry_key }}"
    state: absent
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_cleanup_registry_key | bool
    - win_workman_detect_sw.result.installed
    - win_workman_detect_sw.result.registry_key is not none

- name: Cleanup paths
  ansible.windows.win_file:
    path: "{{ win_workman_item_cleanup_paths }}"
    state: absent
  when:
    - not (win_workman_pkg_portable | bool)
    - win_workman_needs_action | default(false) | bool
    - win_workman_schema.package.cleanup_paths is defined
    - win_workman_schema.package.cleanup_paths is not none
    - win_workman_detect_sw.result.id is not defined or win_workman_detect_sw.result.id is none
  loop: "{{ win_workman_schema.package.cleanup_paths }}"
  loop_control:
    loop_var: win_workman_item_cleanup_paths

- name: Shortcuts
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: shortcuts
  vars:
    win_workman_schema_shortcuts_state: "absent"
  when:
    - not (win_workman_pkg_portable | bool)

- name: Remove paths from Windows system PATH
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: win_path
  vars:
    win_workman_schema_win_path_state: absent
  when:
    - win_workman_schema.package.path_dirs is defined
    - win_workman_schema.package.path_dirs | length > 0
