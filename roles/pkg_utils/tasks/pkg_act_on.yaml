---
- name: Check portable package
  ansible.builtin.set_fact:
    win_workman_pkg_portable: >-
      {{
        true if (
          win_workman_schema.package.provider is defined and
          win_workman_schema.package.provider == 'portable'
        ) else false
      }}
    win_workman_uninstall_before_upgrade: >-
      {{
        win_workman_schema.package.uninstall_before_upgrade
        | default(false, true) | bool
      }}

- name: Derive portable install directories from files metadata | init
  ansible.builtin.set_fact:
    win_workman_portable_file_install_dirs: []
  when:
    - win_workman_pkg_portable | bool

- name: Derive portable install directories from files metadata | build
  ansible.builtin.set_fact:
    win_workman_portable_file_install_dirs: >-
      {{ win_workman_portable_file_install_dirs + [win_workman_portable_file_target_dir] }}
  vars:
    win_workman_portable_file_target_dir: >-
      {{
        win_workman_portable_file.dest_dir
        if (
          win_workman_portable_file.dest_dir is defined
          and win_workman_portable_file.dest_dir is not none
          and (win_workman_portable_file.dest_dir | string | trim | length) > 0
        )
        else ''
      }}
  loop: "{{ win_workman_schema.files | default([]) }}"
  loop_control:
    loop_var: win_workman_portable_file
  when:
    - win_workman_pkg_portable | bool
    - win_workman_portable_file_target_dir | length > 0

- name: Derive portable install file paths from files metadata | init
  ansible.builtin.set_fact:
    win_workman_portable_install_file_paths: []
  when:
    - win_workman_pkg_portable | bool

- name: Derive portable install file paths from files metadata | build
  ansible.builtin.set_fact:
    win_workman_portable_install_file_paths: >-
      {{ win_workman_portable_install_file_paths + [win_workman_portable_file_target_path] }}
  vars:
    win_workman_portable_file_dest_base: >-
      {{
        win_workman_portable_path ~ '\\' ~ win_workman_portable_file.dest_dir
        if (
          win_workman_portable_file.dest_dir is defined
          and win_workman_portable_file.dest_dir is not none
          and (win_workman_portable_file.dest_dir | string | trim | length) > 0
        )
        else win_workman_portable_path
      }}
    win_workman_portable_file_target_path: >-
      {{
        win_workman_portable_file_dest_base ~ '\\' ~ win_workman_portable_file.filename
        if (
          (win_workman_portable_file.extract is not defined or win_workman_portable_file.extract != '7z')
          and (
            win_workman_portable_file.filename is defined
            and win_workman_portable_file.filename is not none
            and (win_workman_portable_file.filename | string | trim | length) > 0
          )
        )
        else ''
      }}
  loop: "{{ win_workman_schema.files | default([]) }}"
  loop_control:
    loop_var: win_workman_portable_file
  when:
    - win_workman_pkg_portable | bool
    - win_workman_portable_file_target_path | length > 0

- name: Set portable package install directories
  ansible.builtin.set_fact:
    win_workman_portable_install_dirs: >-
      {{
        win_workman_schema.package.portable_dirs
        if (
          win_workman_schema.package.portable_dirs is defined
          and win_workman_schema.package.portable_dirs is not none
        )
        else (
          [win_workman_schema.package.portable_dir]
          if (
            win_workman_schema.package.portable_dir is defined
            and win_workman_schema.package.portable_dir is not none
          )
          else (
            win_workman_portable_file_install_dirs
            if (win_workman_portable_file_install_dirs | length > 0)
            else (
              []
              if (win_workman_portable_install_file_paths | default([]) | length > 0)
              else [win_workman_schema.name]
            )
          )
        )
      }}
  when:
    - win_workman_pkg_portable | bool

- name: Fetch portable package state
  ansible.windows.win_powershell:
    script: |
      param(
        [string]$PortablePath, [string]$InstallDirsJson,
        [string]$InstallFilesJson, [string]$ShortcutsJson
      )
      $ErrorActionPreference = "Stop"
      $installDirs = @()
      if (-not [string]::IsNullOrWhiteSpace($InstallDirsJson)) {
        $installDirs = @(ConvertFrom-Json -InputObject $InstallDirsJson)
      }
      $shortcuts = @()
      if (-not [string]::IsNullOrWhiteSpace($ShortcutsJson)) {
        $shortcuts = @(ConvertFrom-Json -InputObject $ShortcutsJson)
      }
      $installFiles = @()
      if (-not [string]::IsNullOrWhiteSpace($InstallFilesJson)) {
        $installFiles = @(ConvertFrom-Json -InputObject $InstallFilesJson)
      }
      $dirResults = foreach ($dir in $installDirs) {
        if ([string]::IsNullOrWhiteSpace([string]$dir)) { continue }
        $path = Join-Path $PortablePath ([string]$dir)
        $item = Get-Item -LiteralPath $path -ErrorAction SilentlyContinue
        [ordered]@{
          name = [string]$dir; path = $path
          exists = $null -ne $item
          is_directory = ($null -ne $item -and $item.PSIsContainer)
        }
      }
      $fileResults = foreach ($filePath in $installFiles) {
        $path = [string]$filePath
        if ([string]::IsNullOrWhiteSpace($path)) { continue }
        $item = Get-Item -LiteralPath $path -ErrorAction SilentlyContinue
        [ordered]@{
          path = $path; exists = $null -ne $item
          is_file = ($null -ne $item -and -not $item.PSIsContainer)
        }
      }
      $shortcutResults = foreach ($shortcut in $shortcuts) {
        $dest = [string]$shortcut.dest
        $path = [Environment]::ExpandEnvironmentVariables($dest)
        if ([string]::IsNullOrWhiteSpace($path)) { continue }
        $item = Get-Item -LiteralPath $path -ErrorAction SilentlyContinue
        [ordered]@{
          description = [string]$shortcut.description; dest = $dest; path = $path
          exists = $null -ne $item
          is_file = ($null -ne $item -and -not $item.PSIsContainer)
        }
      }
      $hasDir  = @($dirResults  | Where-Object { $_.is_directory }).Count -gt 0
      $hasFile = @($fileResults | Where-Object { $_.is_file      }).Count -gt 0
      $installed = $hasDir -or $hasFile
      $Ansible.Changed = $false
      $Ansible.Result = [ordered]@{
        installed = $installed; portable_path = $PortablePath
        directories = @($dirResults); files = @($fileResults)
        shortcuts = @($shortcutResults)
      }
    parameters:
      PortablePath: "{{ win_workman_portable_path }}"
      InstallDirsJson: >-
        {{ win_workman_portable_install_dirs | default([]) | to_json }}
      InstallFilesJson: >-
        {{ win_workman_portable_install_file_paths | default([]) | to_json }}
      ShortcutsJson: >-
        {{ win_workman_schema.shortcuts | default([]) | to_json }}
  register: win_workman_portable_info
  when:
    - win_workman_pkg_portable | bool

- name: Set portable package presence
  ansible.builtin.set_fact:
    win_workman_portable_is_present: >-
      {{ win_workman_portable_info.result.installed | default(false) | bool }}
  when:
    - win_workman_pkg_portable | bool

- name: Get package information
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: info
  when:
    - not (win_workman_pkg_portable | bool)

- name: Normalize versions
  ansible.builtin.set_fact:
    win_workman_installed_version: >-
      {{
        win_workman_detect_sw.result.display_version | default('', true) | trim
      }}
    win_workman_target_version: >-
      {{
        win_workman_schema.package.version
        if (
          win_workman_schema.package.version is defined
          and win_workman_schema.package.version is not none
        ) else 'latest'
      }}
  when:
    - not (win_workman_pkg_portable | bool)

- name: Classify version relation
  ansible.builtin.set_fact:
    win_workman_version_relation: >-
      {{
        "none" if (
          win_workman_installed_version | length == 0
          or win_workman_target_version | length == 0
        ) else (
          "lt" if (
            win_workman_target_version == 'latest' or
            win_workman_installed_version is version(win_workman_target_version, '<')
          ) else (
            "gt" if (
              win_workman_installed_version is version(win_workman_target_version, '>')
            ) else "eq"
          )
        )
      }}
  when:
    - not (win_workman_pkg_portable | bool)

- name: Classify operation
  ansible.builtin.set_fact:
    win_workman_operation: >-
      {{
        (
          'upgrade' if (win_workman_portable_is_present | default(false) | bool)
          else 'install'
        )
        if (win_workman_pkg_portable | bool)
        else (
          'install' if (win_workman_installed_version | length == 0)
          else (
            'upgrade' if (win_workman_version_relation == 'lt')
            else (
              'downgrade' if (win_workman_version_relation == 'gt')
              else 'noop'
            )
          )
        )
      }}

- name: Needs action
  ansible.builtin.set_fact:
    win_workman_needs_action: >-
      {{
        (
          win_workman_operation == 'install'
          or (
            win_workman_operation == 'upgrade'
            and win_workman_uninstall_before_upgrade | bool
          )
        )
        if (win_workman_pkg_portable | bool)
        else (
          win_workman_operation in ['install', 'upgrade']
          or (win_workman_operation == 'downgrade' and win_workman_uninstall_before_upgrade | bool)
        )
      }}

- name: Remove existing portable package before upgrade
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: pkg_act_off
  when:
    - win_workman_needs_action | bool
    - win_workman_pkg_portable | bool
    - win_workman_operation == 'upgrade'
    - win_workman_uninstall_before_upgrade | bool

- name: Download
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: download
  when:
    - win_workman_needs_action | bool

- name: Copy files to Windows
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: win_copy
  when:
    - win_workman_needs_action | bool

- name: Uninstall before upgrade/downgrade
  ansible.windows.win_package:
    product_id: "{{ win_workman_product_id }}"
    state: absent
    provider: "{{ win_workman_provider }}"
    arguments: "{{ win_workman_schema.package.uninstall_args | default([]) }}"
  when:
    - win_workman_uninstall_before_upgrade | bool
    - win_workman_is_present | default(false) | bool
    - win_workman_operation in ['upgrade', 'downgrade']
    - not (win_workman_pkg_portable | bool)

- name: Get install argv
  ansible.builtin.set_fact:
    win_workman_install_provider: >-
      {{
        win_workman_schema.package.provider
        if (
          win_workman_schema.package.provider is defined
          and win_workman_schema.package.provider is not none
        ) else "auto"
      }}
    win_workman_install_setup_path: >-
      {{
        [
          (
            win_workman_schema.package.setup_dir
            if (
              win_workman_schema.package.setup_dir is defined
              and win_workman_schema.package.setup_dir is not none
            )
            else ""
          ),
          (
            win_workman_schema.package.setup_file
            if (
              win_workman_schema.package.setup_file is defined
              and win_workman_schema.package.setup_file is not none
            )
            else win_workman_schema.package.filename
          )
        ]
        | reject('equalto', '')
        | join('\\')
      }}
    win_workman_install_args: >-
      {{
        win_workman_schema.package.install_args
        if (
          win_workman_schema.package.install_args is defined
          and win_workman_schema.package.install_args is not none
        )
        else none
      }}
  when:
    - not (win_workman_pkg_portable | bool)

- name: Before install hook
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: include_tasks
  vars:
    win_workman_schema_tasks: "before_install"
  when:
    - win_workman_needs_action | bool

- name: Before install Powershell script
  ansible.windows.win_powershell:
    script: "{{ win_workman_schema.package.before_install_ps_script }}"
  when:
    - win_workman_needs_action | bool
    - win_workman_schema.package.before_install_ps_script is defined
    - win_workman_schema.package.before_install_ps_script is not none

- name: "Install package '{{ win_workman_schema.name }}'"
  ansible.windows.win_package:
    path: "{{ ansible_remote_tmp }}\\{{ win_workman_install_setup_path }}"
    state: present
    provider: "{{ win_workman_install_provider }}"
    arguments: "{{ win_workman_install_args | default(omit) }}"
  when:
    - win_workman_needs_action | bool
    - not (win_workman_pkg_portable | bool)
  register: win_workman_install_result

- name: After install hook
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: include_tasks
  vars:
    win_workman_schema_tasks: "after_install"
  when:
    - win_workman_needs_action | bool

- name: After install Powershell script
  ansible.windows.win_powershell:
    script: "{{ win_workman_schema.package.after_install_ps_script }}"
  when:
    - win_workman_needs_action | bool
    - win_workman_schema.package.after_install_ps_script is defined
    - win_workman_schema.package.after_install_ps_script is not none

- name: Services
  ansible.windows.win_service:
    name: "{{ win_workman_schema_service.name }}"
    start_mode: "{{ win_workman_schema_service.start_mode }}"
    state: "{{ win_workman_schema_service.state }}"
  when:
    - win_workman_needs_action | bool or not (win_workman_pkg_portable | bool)
    - win_workman_schema.services is defined
    - win_workman_schema.services is not none
  loop: "{{ win_workman_schema.services }}"
  loop_control:
    loop_var: win_workman_schema_service
    label: "{{ win_workman_schema_service.name }}"

- name: Shortcuts
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: shortcuts
  vars:
    win_workman_schema_shortcuts_state: "present"
  when:
    - win_workman_needs_action | bool or not (win_workman_pkg_portable | bool)

- name: Add paths to Windows system PATH
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: win_path
  vars:
    win_workman_schema_win_path_state: present
  when:
    - win_workman_needs_action | bool or not (win_workman_pkg_portable | bool)
    - win_workman_schema.package.path_dirs is defined
    - win_workman_schema.package.path_dirs | length > 0

- name: Purge files from Windows temporary directory
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: win_clean_temp
  when:
    - win_workman_needs_action | bool
