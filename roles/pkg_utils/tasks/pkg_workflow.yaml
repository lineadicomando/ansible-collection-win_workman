---
- name: Validate action
  ansible.builtin.fail:
    msg: >-
      Unknown action '{{ win_workman_action or win_workman_schema.default_action }}'
      for schema '{{ win_workman_schema_dir }}'.
      Valid actions: {{ win_workman_pkg_actions | join(', ') }}.
  when: (win_workman_action or win_workman_schema.default_action) not in win_workman_pkg_actions

- name: Run action {{ win_workman_action or win_workman_schema.default_action }}
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: "pkg_act_{{ win_workman_action or win_workman_schema.default_action }}"
