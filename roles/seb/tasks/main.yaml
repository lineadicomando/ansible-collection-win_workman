---
- name: Deploy SEB client settings
  ansible.builtin.include_tasks: act_deploy.yaml
  when:
    - win_workman_action == "deploy"

- name: Remove SEB client settings file
  ansible.builtin.include_tasks: act_undeploy.yaml
  when:
    - win_workman_action == "undeploy"

- name: Show SEB Config Key for Moodle
  ansible.builtin.include_tasks: act_config_key.yaml
  when:
    - win_workman_action == "config_key"

- name: Install dependency vcredist14
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.vcredist14
  vars:
    win_workman_action: "on"
  when: win_workman_task.act == "on"

- name: Dispatch to package workflow
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.pkg_utils
    tasks_from: pkg_workflow
  vars:
    win_workman_schema: "{{ win_workman_seb_schema }}"
  when: win_workman_action not in ["deploy", "undeploy", "config_key"]
