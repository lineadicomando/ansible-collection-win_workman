---
display_name: Secure SSH (OpenSSH hardening)
custom_actions:
  - name: "on"
    description: Apply hardened OpenSSH configuration (pubkey auth, disable password auth)
  - name: "off"
    description: Revert SSH configuration to defaults
defaults:
  - var: win_workman_secure_ssh_manage_authorized_keys
    type: bool
    default: true
    description: Deploy authorized_keys from inventory variables
  - var: win_workman_secure_ssh_enable_pubkey_auth
    type: bool
    default: true
    description: Enable public key authentication
  - var: win_workman_secure_ssh_disable_password_auth
    type: bool
    default: true
    description: Disable password-based SSH authentication
  - var: win_workman_secure_ssh_manage_allow_users
    type: bool
    default: true
    description: Restrict SSH access to allowed users list
notes: "Requires OpenSSH to be already installed on the target host."
