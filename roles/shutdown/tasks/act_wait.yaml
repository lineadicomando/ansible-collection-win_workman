---
- name: Trigger shutdown
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.shutdown
    tasks_from: act_on

- name: Wait for target to go offline
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ _win_workman_shutdown_wait_port }}"
    state: stopped
    delay: 15
    timeout: 300
  vars:
    _win_workman_shutdown_wait_port: >-
      {{ ansible_port | default(
           22 if ansible_connection | default('ssh') == 'ssh'
           else (5986 if ansible_winrm_scheme | default('http') == 'https' else 5985)
         ) }}
  delegate_to: localhost
