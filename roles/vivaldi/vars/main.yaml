# ==============================================================================
#  Software Information:
#      - Name:        Vivaldi
#      - Homepage:    https://vivaldi.com/
#      - Download:    https://vivaldi.com/download/
# ==============================================================================
---
win_workman_vivaldi_before_uninstall_ps_script: |
  $Ansible.Changed = $false
  $process = Get-Process -Name vivaldi -ErrorAction SilentlyContinue
  if ($process) {
      Stop-Process -InputObject $process -Force:$true
      $Ansible.Changed = $true
  }

win_workman_vivaldi_shortcut_arguments: >-
  {{
    (
      ("--no-default-browser-check " if win_workman_vivaldi_shortcut_no_first_run | default(false) | bool else "") +
      ("--no-first-run " if win_workman_vivaldi_shortcut_no_first_run | default(false) | bool else "") +
      (win_workman_vivaldi_shortcut_url | default(''))
    ) | trim
  }}

win_workman_vivaldi_program_file: "%ProgramFiles%"

win_workman_vivaldi_shortcuts_schema:
  - description: "Vivaldi"
    src: "{{ win_workman_vivaldi_program_file }}\\Vivaldi\\Application\\vivaldi.exe"
    arguments: "{{ win_workman_vivaldi_shortcut_arguments }}"
    dest: "%Public%\\Desktop\\Vivaldi.lnk"
    icon: "{{ win_workman_vivaldi_program_file }}\\Vivaldi\\Application\\vivaldi.exe,0"
    directory: "{{ win_workman_vivaldi_program_file }}\\Vivaldi\\Application\\"
  - description: "Vivaldi"
    src: "{{ win_workman_vivaldi_program_file }}\\Vivaldi\\Application\\vivaldi.exe"
    arguments: "{{ win_workman_vivaldi_shortcut_arguments }}"
    dest: "%ProgramData%\\Microsoft\\Windows\\Start Menu\\Programs\\Vivaldi.lnk"
    icon: "{{ win_workman_vivaldi_program_file }}\\Vivaldi\\Application\\vivaldi.exe,0"
    directory: "{{ win_workman_vivaldi_program_file }}\\Vivaldi\\Application\\"

win_workman_vivaldi_schema:
  name: Vivaldi
  package:
    setup_file: "Vivaldi.7.9.3970.67.x64.exe"
    searchName: "Vivaldi"
    version: "7.9.3970.67"
    install_args:
      - --vivaldi-silent
      - --do-not-launch-chrome
      - --system-level
    uninstall_args:
      - --force-uninstall
    uninstall_via_helper: true
    uninstall_valid_rc:
      - 0
      - 19
    before_uninstall_ps_script: "{{ win_workman_vivaldi_before_uninstall_ps_script }}"
    cleanup_paths:
      - "{{ win_workman_vivaldi_program_file }}\\Vivaldi"
  files:
    - filename: "Vivaldi.7.9.3970.67.x64.exe"
      url: "https://downloads.vivaldi.com/stable/Vivaldi.7.9.3970.67.x64.exe"
      checksum: "sha256:1ececa1c9f40c0b1198e8246298383a16d2a527a4894a321fc4b16bcc00bbcd1"
  shortcuts: >-
    {{
      win_workman_vivaldi_shortcuts_schema if (
        win_workman_vivaldi_shortcuts | bool | default(false)
      ) else []
    }}

win_workman_schema_role_name: lineadicomando.win_workman.vivaldi
win_workman_schema_dir: vivaldi
