---
- name: Scan Windows image health (ScanHealth)
  ansible.windows.win_powershell:
    script: |
      $Ansible.Changed = $false
      $Ansible.Failed  = $false
      $Ansible.Result  = @{}

      try {
        $scan = Repair-WindowsImage -Online -ScanHealth -ErrorAction Stop

        $healthState = $null
        if ($scan -and $scan.PSObject.Properties['ImageHealthState']) {
          $healthState = [string]$scan.ImageHealthState
        }

        switch ($healthState) {
          'Healthy' {
            $Ansible.Failed = $false
            $Ansible.Result = @{
              Status    = 'Healthy'
              Message   = 'Image health: Healthy.'
              ScanState = $healthState
              ScanRaw   = $scan
            }
          }
          'Repairable' {
            $Ansible.Failed = $true
            $Ansible.Result = @{
              Status    = 'Repairable'
              Message   = 'Image health: Repairable.'
              ScanState = $healthState
              ScanRaw   = $scan
            }
          }
          'NonRecoverable' {
            $Ansible.Failed = $true
            $Ansible.Result = @{
              Status    = 'NonRecoverable'
              Message   = 'Image health: NonRecoverable.'
              ScanState = $healthState
              ScanRaw   = $scan
            }
          }
          Default {
            $Ansible.Failed = $true
            if ($healthState) {
              $Ansible.Result = @{
                Status    = 'UnexpectedState'
                Message   = "Image health: $healthState. Unexpected health state."
                ScanState = $healthState
                ScanRaw   = $scan
              }
            } else {
              $Ansible.Result = @{
                Status   = 'MissingState'
                Message  = 'ScanHealth did not return ImageHealthState.'
                ScanRaw  = $scan
              }
            }
          }
        }
      } catch {
        $Ansible.Failed = $true
        $Ansible.Result = @{
          Status  = 'Error'
          Message = "Repair-WindowsImage failed: $($_.Exception.Message)"
        }
      }
  register: win_workman_wim_scan
