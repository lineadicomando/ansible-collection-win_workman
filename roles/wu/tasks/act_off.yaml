---
# Alias for pause at max duration: wu-off suspends updates identically to wu-pause at max days.
- name: Set pause days to role default max for wu-off
  ansible.builtin.set_fact:
    win_workman_wu_pause_days: "{{ win_workman_wu_default_max_pause_days | int }}"

- name: Windows Update off (pause at role max duration)
  ansible.builtin.include_role:
    name: lineadicomando.win_workman.wu
    tasks_from: pause_handler
  vars:
    win_workman_wu_state: "paused"
